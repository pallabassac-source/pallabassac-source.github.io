<html>

<head>
    <title>Happy Birthday</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="loader">
                <div id="countdown" class="countdown-container">
                    <h2 class="coming-soon">Something special is coming...</h2>
                    <div class="timer">
                        <div class="timer-segment">
                            <span id="hours">00</span>
                            <div class="label">Hours</div>
                        </div>
                        <div class="timer-segment">
                            <span id="minutes">00</span>
                            <div class="label">Min</div>
                        </div>
                        <div class="timer-segment">
                            <span id="seconds">00</span>
                            <div class="label">Sec</div>
                        </div>
                    </div>
                </div>
                <button id="play" style="display:none;">Start</button>
            </div>
            <div class="hacker-toggle" style="display:none;">
                <button id="hacker-btn" class="hint-pulse">Digital Universe: OFF</button>
                <div class="click-hint">Click for a surprise!</div>
            </div>
        </div>
    </div>
    <audio class="song" controls loop>
        <source src="music.mp3">
        </source>
        Your browser isn't invited for super fun audio time.
    </audio>
    <canvas id="confetti"></canvas>
    <div class="main">
        <div class="container pt-5">
            <div class="row">

                <div class="col-12 col-xl-6 mx-auto">
                    <img src="img/banner.png" alt="">
                </div>

                <div class="col-12  text-center">
                    <div id="name" class="area">Pallabi Gogoi</div>
                </div>

                <div class="col-12 text-center">
                    <div class="type-wrap">
                        <div id="typed-strings" class="typing">
                            <h2>Happy Birthday <i id="nae">Pallabi Gogoi</i></h2>
                            <h2>Have a wonderful day</h2>
                            <h2>Filled with joy and happiness.</h2>
                        </div>
                        <span id="typed" style="white-space:pre;"></span>
                    </div>
                </div>

                <div class="col-12 col-xl-3 cake hint-pulse">
                    <img src="img/cake.gif" alt="">
                    <div class="cake-hint">Click me! 🎂</div>
                </div>
            </div>
        </div>
        <img src="img/Balloon-Border.png" width="100%" class="balloon-border">
        
        <!-- Hacker Mode Elements -->
        <div id="hacker-terminal" class="terminal-container" style="display:none;">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="terminal-title">pallabi_digital_universe.sh</span>
            </div>
            <div id="terminal-content" class="terminal-body"></div>
        </div>
        <canvas id="matrix-canvas" style="display:none;"></canvas>
    </div>
</body>
<script src="https://unpkg.com/magic-snowflakes/dist/snowflakes.min.js"></script>
<script src="js/jquery.js"></script>
<script src="js/typed.min.js"></script>
<script src="js/decorations.js"></script>
<script src="js/hacker.js"></script>
<script src="js/countdown.js"></script>
<script src="js/script.js"></script>

</html>
